apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: test-chaos-memory-stress
  namespace: services
spec:
  mode: one
  duration: '1m'
  selector:
    namespaces: [services]
    labelSelectors:
      app.kubernetes.io/name: hello-service
  stressors:
    memory: { workers: 1, size: '256MB' }
