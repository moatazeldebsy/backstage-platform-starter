name: Auto-merge service onboarding PRs

# Triggered by the publish:github:pull-request step in every service template.
# All such PRs are titled "feat: onboard <name> to GitOps" and only add
# services/<name>/helm-values-dev.yaml — a safe, bounded change.
# Once this workflow approves and enables auto-merge, the PR lands as soon
# as CI passes and the ArgoCD ApplicationSet auto-discovers the new service.
#
# Prerequisite: enable "Allow auto-merge" in the repo's Settings → General.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: "startsWith(github.event.pull_request.title, 'feat: onboard ')"
    steps:
      - uses: actions/checkout@v6

      - name: Verify only GitOps values files changed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          files=$(gh pr view "$PR_NUMBER" --json files --jq '[.files[].path] | join("\n")')
          echo "Changed files:"
          echo "$files"

          unsafe=$(echo "$files" | grep -vE '^services/[^/]+/helm-values[^/]*\.yaml$' || true)
          if [ -n "$unsafe" ]; then
            echo "::error::PR touches files outside services/*/helm-values-*.yaml — manual review required, skipping auto-merge"
            echo "$unsafe"
            exit 1
          fi
          echo "All changed files are safe GitOps values files."

      - name: Approve PR
        # GITHUB_TOKEN cannot approve its own PR (GitHub blocks self-approval).
        # Set GH_PAT to a PAT from a different account with repo scope.
        # If GH_PAT is absent this step is skipped; the PR requires manual approval.
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not configured — skipping auto-approval. Merge the PR manually or set the GH_PAT secret."
            exit 0
          fi
          gh pr review "$PR_NUMBER" --approve \
            --body "Auto-approved: PR only adds Helm values under \`services/\`. ArgoCD ApplicationSet will discover and deploy the service once this merges."

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch \
            --subject "feat: onboard service to GitOps (auto-merged)"
