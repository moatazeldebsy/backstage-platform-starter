name: CI

on:
  push:
    branches: ['**']
    paths:
      - 'services/**'
      - 'helm/**'
      - 'kubernetes/**'
      - 'terraform/**'
      - 'backstage/app/**'
      - 'backstage/Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'helm/**'
      - 'kubernetes/**'
      - 'terraform/**'
      - 'backstage/app/**'
      - 'backstage/Dockerfile'
      - '.github/workflows/ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-hello-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/hello-service/go.mod

      - name: Run tests with coverage
        working-directory: services/hello-service
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: services/hello-service/coverage.out
          retention-days: 1

  helm-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Lint service-template chart
        run: helm lint helm/service-template

      - name: Lint with required values
        run: helm lint helm/service-template --set image.repository=test --set image.tag=abc1234

  k8s-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install kubeconform
        run: |
          curl -sSLO "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz"
          curl -sSLO "https://github.com/yannh/kubeconform/releases/download/v0.6.7/CHECKSUMS"
          grep "kubeconform-linux-amd64.tar.gz" CHECKSUMS | sha256sum -c
          tar -xz -f kubeconform-linux-amd64.tar.gz && sudo mv kubeconform /usr/local/bin/

      - name: Validate namespace manifests
        run: kubeconform -strict -summary kubernetes/namespaces/

      - name: Validate RBAC manifests
        run: kubeconform -strict -summary kubernetes/rbac/

  backstage-compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        working-directory: backstage/app
        run: yarn install --immutable

      - name: Build backend bundle
        working-directory: backstage/app
        run: yarn build:backend

      - name: Build Docker image (local, no push)
        run: docker build -t backstage:ci -f backstage/Dockerfile backstage/app

  terraform-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.10.5'

      - name: terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate
