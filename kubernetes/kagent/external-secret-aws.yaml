# External Secrets for KAgent — AWS/EKS variant.
#
# Syncs idp-mvp/kagent from AWS Secrets Manager into the kagent-anthropic
# Kubernetes Secret consumed by KAgent's controller and agents.
#
# A dedicated ServiceAccount (kagent-eso-sa) with IRSA is used so that only
# the kagent namespace can read this secret (least-privilege).
#
# bootstrap-ai.sh --aws annotates kagent-eso-sa with the IRSA role ARN
# (kagent_eso_role_arn terraform output) after applying this manifest.
#
# AWS_REGION_PLACEHOLDER is substituted by bootstrap-ai.sh --aws at deploy time.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagent-eso-sa
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: kagent
  # eks.amazonaws.com/role-arn annotated by bootstrap-ai.sh --aws
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: kagent
spec:
  provider:
    aws:
      service: SecretsManager
      region: AWS_REGION_PLACEHOLDER
      auth:
        jwt:
          serviceAccountRef:
            name: kagent-eso-sa
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-anthropic
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: kagent-anthropic
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: idp-mvp/kagent
