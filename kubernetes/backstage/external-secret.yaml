# SecretStore — uses the backstage ServiceAccount (annotated with IRSA) to
# authenticate with AWS Secrets Manager. bootstrap.sh annotates the SA with
# the IRSA role ARN before applying this manifest.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: backstage
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: backstage
---
# ExternalSecret — syncs all keys from idp-mvp/backstage into the
# backstage-secrets K8s Secret that deployment.yaml already reads from.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-secrets
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: backstage-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: idp-mvp/backstage
