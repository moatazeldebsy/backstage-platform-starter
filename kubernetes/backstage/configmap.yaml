# ── backstage-base-config ─────────────────────────────────────────────────────
# Contains all non-URL settings. Catalog locations are intentionally absent here
# so the production config can own them with GitHub URLs (works on EKS without
# any catalog volume mount).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-base-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      title: IDP Developer Portal
      baseUrl: http://localhost:3000
      packages: all
      extensions:
        - page:catalog:
            config:
              path: /

    organization:
      name: My Organization

    backend:
      baseUrl: http://localhost:7007
      listen:
        port: 7007
      csp:
        connect-src: ["'self'", 'http:', 'https:']
        upgrade-insecure-requests: false
      cors:
        origin: http://localhost:3000
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          ssl:
            rejectUnauthorized: false

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    techdocs:
      builder: 'local'
      generator:
        runIn: 'local'
      publisher:
        type: 'awsS3'
        awsS3:
          bucketName: ${TECHDOCS_S3_BUCKET_NAME}
          region: ${AWS_REGION}

    auth:
      environment: production
      session:
        secret: ${AUTH_SESSION_SECRET:-backstage-session-secret}
      providers:
        github:
          production:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName
                - resolver: emailMatchingUserEntityProfileEmail

    scaffolder:
      defaultAuthor:
        name: IDP Bot
        email: idp-bot@example.com
      defaultCommitMessage: "chore: scaffold service via IDP"

    kubernetes:
      serviceLocatorMethod:
        type: 'multiTenant'
      clusterLocatorMethods:
        - type: 'config'
          clusters:
            - url: ${K8S_CLUSTER_URL}
              name: idp-mvp
              authProvider: 'serviceAccount'
              skipTLSVerify: true
              skipMetricsLookup: false
              serviceAccountToken: ${K8S_SERVICE_ACCOUNT_TOKEN}
---
# ── backstage-config (production overrides) ───────────────────────────────────
# Sets the real ALB URL and all catalog locations as GitHub URLs.
# Using GitHub URLs means templates are always in sync with the main branch —
# no image rebuild or volume mount needed when templates change.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-config
  namespace: backstage
data:
  app-config.production.yaml: |
    app:
      # Patched by bootstrap.sh after ALB is provisioned
      baseUrl: http://BACKSTAGE_ALB_URL

    backend:
      baseUrl: http://BACKSTAGE_ALB_URL
      cors:
        origin: http://BACKSTAGE_ALB_URL

    techRadar:
      url: https://raw.githubusercontent.com/YOUR_GITHUB_ORG/backstage-idp-starter/main/backstage/catalog/tech-radar.json

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group]
      locations:
        # ── Service templates ────────────────────────────────────────────────
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/nodejs-service/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/python-service/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/go-service/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/react-frontend/template.yaml
          rules:
            - allow: [Template]
        # ── Infrastructure templates ─────────────────────────────────────────
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/terraform-module/template.yaml
          rules:
            - allow: [Template]
        # ── Platform self-service templates ──────────────────────────────────
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/team-namespace/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/add-secret/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/rds-database/template.yaml
          rules:
            - allow: [Template]
        # ── Local deploy template (Kind only — still visible for reference) ──
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/deploy-to-kind/template.yaml
          rules:
            - allow: [Template]
        # ── QA Platform golden-path templates ───────────────────────────────
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/playwright-e2e-suite/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/k6-performance-suite/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/pact-contract-suite/template.yaml
          rules:
            - allow: [Template]
        # ── QA addon templates ───────────────────────────────────────────────
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/add-unit-tests/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/add-e2e-tests/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/templates/add-k6-tests/template.yaml
          rules:
            - allow: [Template]
        # ── Platform entities ────────────────────────────────────────────────
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/catalog-info.yaml
          rules:
            - allow: [Component, System, User, Group]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/apis/hello-service-api.yaml
          rules:
            - allow: [API]
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/services/hello-service/catalog-info.yaml
          rules:
            - allow: [Component]
        # ── QA Platform catalog ──────────────────────────────────────────────
        - type: url
          target: https://github.com/YOUR_GITHUB_ORG/backstage-idp-starter/blob/main/backstage/catalog/qa-catalog.yaml
          rules:
            - allow: [Component, Group, User, Resource]
