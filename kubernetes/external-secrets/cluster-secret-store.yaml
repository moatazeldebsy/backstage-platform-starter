---
# ClusterSecretStore — AWS Secrets Manager backend for External Secrets Operator.
# This is a cluster-scoped resource; any ExternalSecret in any namespace can
# reference it with: secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
#
# The ESO ServiceAccount (external-secrets-sa in namespace external-secrets) must be
# annotated with the Backstage IRSA role ARN (done by bootstrap.sh after terraform apply):
#
#   kubectl annotate serviceaccount external-secrets-sa \
#     -n external-secrets \
#     "eks.amazonaws.com/role-arn=<backstage_role_arn>" --overwrite
#
# The backstage_irsa role policy (terraform/iam.tf) already grants
# secretsmanager:GetSecretValue for all idp-mvp/* secrets.
#
# Apply: kubectl apply -f kubernetes/external-secrets/cluster-secret-store.yaml
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
  labels:
    app.kubernetes.io/component: external-secrets
    app.kubernetes.io/managed-by: bootstrap
spec:
  provider:
    aws:
      service: SecretsManager
      # Region is templated by bootstrap.sh; placeholder replaced at apply time.
      region: "YOUR_AWS_REGION"
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
