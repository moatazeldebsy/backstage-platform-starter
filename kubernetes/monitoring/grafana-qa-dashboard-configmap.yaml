# Grafana dashboard ConfigMap for the QA Platform.
# Provisioned via dashboardsConfigMaps.qa in prometheus-stack-values.yaml, which mounts this
# ConfigMap to /var/lib/grafana/dashboards/qa and the "qa" file provider serves it.
#
# NOTE: Do NOT add the grafana_dashboard: "1" label here. That label causes the Grafana sidecar
# to ALSO load the file to /tmp/dashboards — dual provisioning in Grafana 11 results in:
#   "Cannot change resource manager; remove the existing manager first, then add the new one"
#
# To apply: kubectl apply -f kubernetes/monitoring/grafana-qa-dashboard-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-qa-dashboard
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
data:
  qa-metrics.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "description": "QA Platform & Quality Enablement — E2E pass rates, k6 performance, and quality gate status",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "green", "value": 0.9 }
                ]
              },
              "unit": "percentunit",
              "min": 0, "max": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "E2E Pass Rate (last run)",
          "type": "gauge",
          "targets": [
            {
              "expr": "e2e_pass_rate",
              "legendFormat": "{{suite}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 300 },
                  { "color": "red", "value": 500 }
                ]
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "k6 p95 Latency (last run)",
          "type": "gauge",
          "targets": [
            {
              "expr": "perf_http_req_duration_p95_ms",
              "legendFormat": "{{suite}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit",
              "min": 0, "max": 0.1
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "k6 Error Rate (last run)",
          "type": "gauge",
          "targets": [
            {
              "expr": "perf_http_error_rate",
              "legendFormat": "{{suite}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["sum"] }, "textMode": "auto" },
          "title": "Tests Run Today",
          "type": "stat",
          "targets": [
            {
              "expr": "increase(e2e_tests_total[1d])",
              "legendFormat": "{{suite}} / {{result}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "percentunit",
              "min": 0, "max": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 5,
          "options": { "legend": { "calcs": ["lastNotNull", "min"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "E2E Pass Rate — 7 day trend",
          "type": "timeseries",
          "targets": [
            {
              "expr": "e2e_pass_rate",
              "legendFormat": "{{suite}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 6,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "k6 p95 Latency — trend",
          "type": "timeseries",
          "targets": [
            {
              "expr": "perf_http_req_duration_p95_ms",
              "legendFormat": "{{suite}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "percentunit",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 14 },
          "id": 7,
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "right" }, "tooltip": { "mode": "multi" } },
          "title": "k6 Error Rate — trend",
          "type": "timeseries",
          "targets": [
            {
              "expr": "perf_http_error_rate",
              "legendFormat": "{{suite}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "5m",
      "schemaVersion": 38,
      "tags": ["qa", "testing", "quality", "k6", "e2e"],
      "templating": { "list": [] },
      "time": { "from": "now-7d", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "QA Platform Metrics",
      "uid": "qa-metrics",
      "version": 2
    }
