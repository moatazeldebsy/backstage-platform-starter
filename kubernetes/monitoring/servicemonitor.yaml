# ServiceMonitor: tells Prometheus to scrape all services in the `services` namespace
# that have the prometheus.io/scrape: "true" pod annotation.
# The helm/service-template chart sets this annotation by default.
# Apply with: kubectl apply -f kubernetes/monitoring/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: idp-services
  namespace: monitoring
  labels:
    release: prometheus   # must match kube-prometheus-stack release name
spec:
  namespaceSelector:
    matchNames:
      - services
      - services-dev
      - services-staging
      - services-prod
  selector:
    matchLabels: {}   # match all services in the namespace
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_namespace]
          regex: "services-(.*)"
          replacement: "$1"
          targetLabel: environment
