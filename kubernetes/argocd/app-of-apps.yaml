# ArgoCD ApplicationSet — creates one Application per service per environment.
# Watches the services/ directory of the platform repo. Each service must have:
#   services/<name>/helm-values-dev.yaml
#   services/<name>/helm-values-staging.yaml
#   services/<name>/helm-values.yaml   (prod)
#
# Apply: kubectl apply -f kubernetes/argocd/app-of-apps.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: idp-services
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # Generator 1: discover services from the platform repo
          - git:
              repoURL: https://github.com/moatazeldebsy/backstage-idp-starter.git
              revision: HEAD
              directories:
                - path: services/*
          # Generator 2: one entry per environment
          - list:
              elements:
                - env: dev
                  namespace: services-dev
                  valuesFile: helm-values-dev.yaml
  template:
    metadata:
      name: "{{path.basename}}-{{env}}"
      labels:
        environment: "{{env}}"
        service: "{{path.basename}}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/moatazeldebsy/backstage-idp-starter.git
          targetRevision: HEAD
          path: helm/service-template
          helm:
            parameters:
              - name: backstage.kubernetesId
                value: "{{path.basename}}"
            valueFiles:
              - $values/services/{{path.basename}}/{{valuesFile}}
        - repoURL: https://github.com/moatazeldebsy/backstage-idp-starter.git
          targetRevision: HEAD
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
