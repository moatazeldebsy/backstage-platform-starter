# MLflow tracking server — AWS/EKS variant.
#
# Differences from mlflow.yaml (local):
#   - Dedicated ServiceAccount with IRSA for S3 artifact access
#   - EBS PVC (gp2, 1Gi) for the SQLite tracking DB (survives pod restarts)
#   - S3 artifact root: s3://MLFLOW_ARTIFACTS_BUCKET_PLACEHOLDER/artifacts
#     (placeholder substituted by bootstrap-ai.sh --aws via sed before kubectl apply)
#   - ALB ingress instead of nginx
#
# bootstrap-ai.sh --aws also annotates the mlflow ServiceAccount with
# the IRSA role ARN (mlflow_role_arn terraform output) after applying.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow
  namespace: ml-platform
  labels:
    app: mlflow
  # eks.amazonaws.com/role-arn annotated by bootstrap-ai.sh --aws
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-db
  namespace: ml-platform
  labels:
    app: mlflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ml-platform
  labels:
    app: mlflow
    backstage.io/kubernetes-id: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        backstage.io/kubernetes-id: mlflow
    spec:
      serviceAccountName: mlflow
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.0
          command:
            - mlflow
            - server
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
            - --backend-store-uri
            - sqlite:////mlflow/mlflow.db
            - --default-artifact-root
            - s3://MLFLOW_ARTIFACTS_BUCKET_PLACEHOLDER/artifacts
            - --workers
            - "1"
            - --gunicorn-opts
            - "--timeout 120 --graceful-timeout 60"
          ports:
            - name: http
              containerPort: 5000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: mlflow-db
              mountPath: /mlflow
      volumes:
        - name: mlflow-db
          persistentVolumeClaim:
            claimName: mlflow-db
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: ml-platform
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlflow
  namespace: ml-platform
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
