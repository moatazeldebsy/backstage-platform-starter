# Production ALB Ingress for AlertManager (kube-prometheus-stack release name: prometheus)
# Apply after kube-prometheus-stack is deployed to EKS:
#   kubectl apply -f kubernetes/ingress/alertmanager-ingress.yaml
#
# hosts: [] — matches any hostname; set to real domain when Route53/DNS is configured.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-alertmanager
                port:
                  number: 9093
