---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: qa-team
  title: QA Platform Team
  description: Owns the QA Platform & Quality Enablement capability — test tooling, quality gates, and E2E scaffolds.
spec:
  type: team
  profile:
    displayName: QA Platform Team
    email: qa-platform@idp.local
  parent: platform-team
  children: []
  members:
    - qa-engineer
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: qa-engineer
  title: QA Platform Engineer
spec:
  profile:
    displayName: QA Engineer
    email: qa-engineer@idp.local
  memberOf:
    - qa-team
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: qa-platform
  title: QA Platform & Quality Enablement
  description: |
    Platform capability that provides golden-path testing scaffolds, CI quality gates,
    cross-browser E2E via LambdaTest, and QA KPI dashboards.
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - qa
    - quality-gates
    - playwright
    - testing
  links:
    - title: QA Metrics (Grafana)
      url: http://grafana.idp.local/d/qa-metrics/qa-metrics
      icon: dashboard
    - title: Playwright E2E Reports
      url: https://github.com/moatazeldebsy/backstage-idp-starter/actions
      icon: github
spec:
  type: platform-capability
  lifecycle: production
  owner: qa-team
  system: internal-developer-platform
  dependsOn:
    - resource:lambdatest
    - resource:mailtrap
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: lambdatest
  title: LambdaTest
  description: |
    Cross-browser cloud testing grid for running Playwright and Cypress suites
    across 3000+ real browsers and OS combinations. Currently under assessment.
  tags:
    - e2e
    - cross-browser
    - cloud-testing
  links:
    - title: LambdaTest Dashboard
      url: https://app.lambdatest.com
      icon: dashboard
spec:
  type: cross-browser-grid
  owner: qa-team
  system: internal-developer-platform
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: mailtrap
  title: Mailtrap
  description: |
    Email sandbox for safely testing transactional email flows in CI and staging.
    Captures outgoing emails without reaching real inboxes.
  tags:
    - email-testing
    - sandbox
  links:
    - title: Mailtrap Inbox
      url: https://mailtrap.io/inboxes
      icon: email
spec:
  type: email-sandbox
  owner: qa-team
  system: internal-developer-platform
