apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: hello-service-api
  title: Hello Service API
  description: REST API exposed by the hello-service reference implementation
  tags:
    - rest
    - go
    - example
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  definition: |
    openapi: "3.0.3"
    info:
      title: Hello Service API
      version: "1.0.0"
      description: Reference Go service deployed via the IDP golden path
    servers:
      - url: http://hello-service.services.svc.cluster.local
        description: In-cluster
    paths:
      /:
        get:
          summary: Service info
          operationId: getRoot
          responses:
            "200":
              description: Service identity and version
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      service:
                        type: string
                        example: hello-service
                      version:
                        type: string
                        example: "1.0.0"
                      message:
                        type: string
                        example: Hello from the IDP!
      /healthz:
        get:
          summary: Liveness probe
          operationId: healthz
          responses:
            "200":
              description: Service is alive
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
      /ready:
        get:
          summary: Readiness probe
          operationId: ready
          responses:
            "200":
              description: Service is ready to serve traffic
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ready
      /metrics:
        get:
          summary: Prometheus metrics
          operationId: metrics
          responses:
            "200":
              description: Prometheus text format metrics
              content:
                text/plain:
                  schema:
                    type: string
