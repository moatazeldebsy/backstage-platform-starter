apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: ${{ values.name }}-network-latency
  namespace: ${{ values.namespace }}
spec:
  action: delay
  mode: all
  duration: '${{ values.duration }}'
  selector:
    namespaces:
      - ${{ values.namespace }}
    labelSelectors:
      app.kubernetes.io/name: ${{ values.name | replace('-chaos', '') | replace('-resilience', '') }}
  delay:
    latency: '100ms'
    jitter: '20ms'
    correlation: '25'
