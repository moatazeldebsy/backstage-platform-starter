apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: ${{ values.name }}-memory-stress
  namespace: ${{ values.namespace }}
spec:
  mode: one
  duration: '${{ values.duration }}'
  selector:
    namespaces:
      - ${{ values.namespace }}
    labelSelectors:
      app.kubernetes.io/name: ${{ values.name | replace('-chaos', '') | replace('-resilience', '') }}
  stressors:
    memory:
      workers: 1
      size: '256MB'
