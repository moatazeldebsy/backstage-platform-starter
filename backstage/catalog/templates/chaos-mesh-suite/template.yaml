apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: chaos-mesh-suite
  title: Chaos Engineering Suite (Chaos Mesh)
  description: Scaffold Chaos Mesh experiment definitions for resilience testing — pod failure, network latency, and stress scenarios
  tags:
    - chaos
    - chaos-mesh
    - resilience
    - testing
    - qa
    - local
    - aws
spec:
  owner: qa-team
  type: test-suite

  parameters:
    - title: Suite Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Suite Name
          type: string
          description: Unique name for this test suite (lowercase, hyphens only)
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        targetService:
          title: Target Service
          type: string
          description: The service this test suite targets
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Component
                spec.type: service
              - kind: Component
                spec.type: website
        deploymentMode:
          title: Deployment Mode
          type: string
          enum: [new-repository, add-to-existing]
          enumNames:
            - 'Create a new repository'
            - 'Add tests to an existing service repo (opens PR)'
          default: new-repository
      dependencies:
        deploymentMode:
          oneOf:
            - properties:
                deploymentMode:
                  enum: [new-repository]
                repoUrl:
                  title: GitHub Repository
                  type: string
                  ui:field: RepoUrlPicker
                  ui:help: 'Repository name must not already exist on GitHub.'
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - repoUrl
            - properties:
                deploymentMode:
                  enum: [add-to-existing]
                targetRepoUrl:
                  title: Target Service Repository
                  type: string
                  description: 'Pick the existing GitHub repo to open the PR against (must match the selected target service)'
                  ui:field: RepoUrlPicker
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - targetRepoUrl

    - title: Chaos Configuration
      properties:
        namespace:
          title: Target Namespace
          type: string
          description: Kubernetes namespace where the target service runs (Kind and EKS supported — set KUBECONFIG or EKS_CLUSTER_NAME + AWS_REGION GitHub secrets)
          default: services
        experiments:
          title: Experiment Types
          type: array
          description: Chaos experiments to scaffold
          items:
            type: string
            enum:
              - pod-failure
              - network-latency
              - cpu-stress
              - memory-stress
          default:
            - pod-failure
            - network-latency
          ui:widget: checkboxes
        duration:
          title: Experiment Duration
          type: string
          description: How long each experiment runs (e.g. 30s, 1m, 5m)
          default: '1m'

  steps:
    - id: fetch-template-new-repo
      name: Fetch Template (New Repo)
      action: fetch:template
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          namespace: ${{ parameters.namespace }}
          experiments: ${{ parameters.experiments }}
          duration: ${{ parameters.duration }}
          githubOrg: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: fetch-template-addon
      name: Fetch Template (Add to Existing)
      action: fetch:template
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        url: ./skeleton-addon
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          namespace: ${{ parameters.namespace }}
          experiments: ${{ parameters.experiments }}
          duration: ${{ parameters.duration }}
          githubOrg: ${{ (parameters.targetRepoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.targetRepoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        gitCommitMessage: "chore: initial scaffold via IDP"
        topics:
          - chaos-mesh
          - chaos-engineering
          - resilience

    - id: publish-pr
      name: Open Pull Request on Service Repo
      action: publish:github:pull-request
      continueOnError: true
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        repoUrl: ${{ parameters.targetRepoUrl }}
        title: 'test: add ${{ parameters.name }} Chaos Mesh engineering suite'
        branchName: feat/add-${{ parameters.name }}-chaos-suite
        description: |
          ## Add ${{ parameters.name }} Chaos Engineering Suite

          Adds a chaos engineering suite targeting `${{ parameters.targetService }}`.

          **What's included:**
          - Test files under `test-suites/${{ parameters.name }}/`
          - GitHub Actions CI workflow at `.github/workflows/${{ parameters.name }}-chaos.yml`
          - Backstage catalog entry at `test-suites/${{ parameters.name }}/catalog-info.yaml`

          After merging, register the catalog entry via **Backstage → Catalog → Register existing component**.

          > Scaffolded via the IDP QA Platform
        sourcePath: .

    - id: register
      name: Register in Catalog
      action: catalog:register
      continueOnError: true
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
