apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: pact-contract-suite
  title: Pact Contract Test Suite
  description: Scaffold a Pact consumer-driven contract test suite with PactFlow broker publishing
  tags:
    - pact
    - contract-testing
    - testing
    - qa
    - local
    - aws
spec:
  owner: qa-team
  type: test-suite

  parameters:
    - title: Suite Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Suite Name
          type: string
          description: Unique name for this test suite (lowercase, hyphens only)
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        targetService:
          title: Target Service
          type: string
          description: The service this test suite targets
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Component
                spec.type: service
              - kind: Component
                spec.type: website
        deploymentMode:
          title: Deployment Mode
          type: string
          enum: [new-repository, add-to-existing]
          enumNames:
            - 'Create a new repository'
            - 'Add tests to an existing service repo (opens PR)'
          default: new-repository
      dependencies:
        deploymentMode:
          oneOf:
            - properties:
                deploymentMode:
                  enum: [new-repository]
                repoUrl:
                  title: GitHub Repository
                  type: string
                  ui:field: RepoUrlPicker
                  ui:help: 'Repository name must not already exist on GitHub.'
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - repoUrl
            - properties:
                deploymentMode:
                  enum: [add-to-existing]
                targetRepoUrl:
                  title: Target Service Repository
                  type: string
                  description: 'Pick the existing GitHub repo to open the PR against (must match the selected target service)'
                  ui:field: RepoUrlPicker
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - targetRepoUrl

    - title: Pact Configuration
      required:
        - consumerName
        - providerName
      properties:
        consumerName:
          title: Consumer Name
          type: string
          description: Name of the consumer (the service that calls the provider API)
        providerName:
          title: Provider Name
          type: string
          description: Name of the provider service being contracted
        pactBrokerUrl:
          title: Pact Broker URL
          type: string
          description: URL of your PactFlow broker (leave blank to skip publishing)
          default: 'https://YOUR_ORG.pactflow.io'
        providerBaseUrl:
          title: Provider Base URL
          type: string
          description: 'Provider URL for verification runs (e.g. http://localhost:8080 for Kind, or https://<alb-dns>.amazonaws.com for AWS)'
          default: ''

  steps:
    - id: fetch-template-new-repo
      name: Fetch Template (New Repo)
      action: fetch:template
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          consumerName: ${{ parameters.consumerName }}
          providerName: ${{ parameters.providerName }}
          pactBrokerUrl: ${{ parameters.pactBrokerUrl }}
          providerBaseUrl: ${{ parameters.providerBaseUrl }}
          githubOrg: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: fetch-template-addon
      name: Fetch Template (Add to Existing)
      action: fetch:template
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        url: ./skeleton-addon
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          consumerName: ${{ parameters.consumerName }}
          providerName: ${{ parameters.providerName }}
          pactBrokerUrl: ${{ parameters.pactBrokerUrl }}
          providerBaseUrl: ${{ parameters.providerBaseUrl }}
          githubOrg: ${{ (parameters.targetRepoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.targetRepoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        gitCommitMessage: "chore: initial scaffold via IDP"
        topics:
          - pact
          - contract-testing
          - qa

    - id: publish-pr
      name: Open Pull Request on Service Repo
      action: publish:github:pull-request
      continueOnError: true
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        repoUrl: ${{ parameters.targetRepoUrl }}
        title: 'test: add ${{ parameters.name }} Pact contract test suite'
        branchName: feat/add-${{ parameters.name }}-contract-suite
        description: |
          ## Add ${{ parameters.name }} Pact Contract Test Suite

          Adds a pact contract test suite targeting `${{ parameters.targetService }}`.

          **What's included:**
          - Test files under `test-suites/${{ parameters.name }}/`
          - GitHub Actions CI workflow at `.github/workflows/${{ parameters.name }}-contract.yml`
          - Backstage catalog entry at `test-suites/${{ parameters.name }}/catalog-info.yaml`

          After merging, register the catalog entry via **Backstage → Catalog → Register existing component**.

          > Scaffolded via the IDP QA Platform
        sourcePath: .

    - id: register
      name: Register in Catalog
      action: catalog:register
      continueOnError: true
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
