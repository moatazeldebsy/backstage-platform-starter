apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: team-${{ values.teamName }}
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 128Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 10m
        memory: 16Mi
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi
