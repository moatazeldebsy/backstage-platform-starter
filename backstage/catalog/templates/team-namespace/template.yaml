apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: team-namespace
  title: Provision Team Namespace
  description: Self-service team onboarding — creates a Kubernetes namespace with RBAC, resource quotas, network policies, and LimitRange.
  tags:
    - platform
    - kubernetes
    - onboarding
    - self-service
    - local
    - aws
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Team Information
      required:
        - teamName
        - ownerGroup
        - costCenter
      properties:
        teamName:
          title: Team name
          type: string
          description: Lowercase, alphanumeric + hyphens (e.g. payments, auth-team)
          pattern: '^[a-z][a-z0-9-]{1,28}[a-z0-9]$'
          ui:autofocus: true
        ownerGroup:
          title: Owner group
          type: string
          description: Backstage group that owns this namespace
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        costCenter:
          title: Cost center
          type: string
          description: Billing tag applied to all resources (e.g. CC-1234)

    - title: Resource Quotas
      properties:
        maxCPU:
          title: Max CPU (requests)
          type: string
          default: "4"
          description: Total CPU request limit for the namespace (e.g. 4, 8)
        maxMemory:
          title: Max memory (requests)
          type: string
          default: 8Gi
          description: Total memory request limit for the namespace (e.g. 8Gi, 16Gi)
        maxPods:
          title: Max pods
          type: string
          default: "20"
          description: Maximum number of pods allowed in the namespace

    - title: Platform repo
      required:
        - githubOrg
        - platformRepo
      properties:
        githubOrg:
          title: GitHub organisation
          type: string
          default: moatazeldebsy
        platformRepo:
          title: Platform repo
          type: string
          default: idp-mvp
          description: The IDP platform repo where team manifests will be committed

  steps:
    - id: fetch-k8s
      name: Render Kubernetes manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: kubernetes/teams/${{ parameters.teamName }}
        values:
          teamName: ${{ parameters.teamName }}
          ownerGroup: ${{ parameters.ownerGroup }}
          costCenter: ${{ parameters.costCenter }}
          maxCPU: ${{ parameters.maxCPU }}
          maxMemory: ${{ parameters.maxMemory }}
          maxPods: ${{ parameters.maxPods }}

    - id: fetch-catalog
      name: Render Backstage Group entity
      action: fetch:template
      input:
        url: ./catalog-skeleton
        targetPath: backstage/catalog/groups
        values:
          teamName: ${{ parameters.teamName }}
          ownerGroup: ${{ parameters.ownerGroup }}
          githubOrg: ${{ parameters.githubOrg }}
          platformRepo: ${{ parameters.platformRepo }}

    - id: publish
      name: Publish to platform repo
      action: publish:github:pull-request
      continueOnError: true
      input:
        repoUrl: github.com?repo=${{ parameters.platformRepo }}&owner=${{ parameters.githubOrg }}
        branchName: team/${{ parameters.teamName }}-namespace
        title: "feat(platform): provision namespace and catalog entry for team ${{ parameters.teamName }}"
        description: |
          Auto-generated by Backstage IDP scaffolder.

          Creates namespace `team-${{ parameters.teamName }}` with:
          - Restricted Pod Security Standards
          - ResourceQuota: ${{ parameters.maxCPU }} CPU / ${{ parameters.maxMemory }} memory / ${{ parameters.maxPods }} pods
          - LimitRange: default container requests/limits
          - NetworkPolicy: deny-all ingress (allow same-namespace + monitoring)
          - RBAC: deployer ServiceAccount + Role

          Also registers `${{ parameters.teamName }}` as a Backstage Group entity under
          `backstage/catalog/groups/${{ parameters.teamName }}.yaml` — no manual catalog
          registration required after merge.

          Merge this PR to apply the namespace to the cluster via CI.
        commitMessage: "chore(platform): scaffold namespace and catalog entry for team ${{ parameters.teamName }}"

  output:
    links:
      - title: Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
    text:
      - title: Next steps
        content: |
          1. Review and merge the PR — CI will `kubectl apply` the manifests automatically.
          2. Once merged, the team `${{ parameters.teamName }}` will appear in the Backstage
             catalog automatically (no manual registration needed).
          3. Share the deployer ServiceAccount token with your team:
             ```bash
             kubectl get secret team-${{ parameters.teamName }}-deployer-token \
               -n team-${{ parameters.teamName }} \
               -o jsonpath='{.data.token}' | base64 -d
             ```
