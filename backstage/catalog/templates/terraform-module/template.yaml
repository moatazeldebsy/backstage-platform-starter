apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: terraform-module
  title: Terraform Module
  description: Scaffold a reusable Terraform module with tests, examples, and CI pipeline
  tags:
    - terraform
    - infrastructure
    - iac
    - golden-path
    - aws
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Module Details
      required:
        - name
        - description
        - owner
        - provider
      properties:
        name:
          title: Module Name
          type: string
          description: Module name (lowercase, hyphens only) — will be prefixed with "terraform-aws-"
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          description: Team or user owning this module
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        provider:
          title: Primary Cloud Provider
          type: string
          default: aws
          enum:
            - aws
            - kubernetes
            - helm

    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub Repository
          type: string
          ui:field: RepoUrlPicker
          ui:help: "Repository name must not already exist on GitHub. If you get a 'name already exists' error, choose a different name."
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - moatazeldebsy

  steps:
    - id: fetch-template
      name: Fetch Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          provider: ${{ parameters.provider }}
          githubOrg: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        gitCommitMessage: "chore: initial scaffold via IDP"
        topics:
          - terraform
          - infrastructure
          - idp-module

    - id: register
      name: Register in Catalog
      action: catalog:register
      continueOnError: true
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
