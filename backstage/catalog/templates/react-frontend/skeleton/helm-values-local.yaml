replicaCount: 1

image:
  repository: localhost:5003/${{ values.name }}
  tag: "local"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: ${{ values.name }}.idp.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

env:
  - name: ENVIRONMENT
    value: local

labels:
  backstage.io/kubernetes-id: ${{ values.name }}

# nginx-prometheus-exporter sidecar — scrapes nginx stub_status and exposes
# Prometheus metrics (nginx_connections_*, nginx_http_requests_total) on :9113
metrics:
  enabled: true
  port: metrics
  path: /metrics

extraPorts:
  - name: metrics
    port: 9113
    targetPort: 9113

extraContainers:
  - name: nginx-exporter
    image: nginx/nginx-prometheus-exporter:1.3.0
    args:
      - --nginx.scrape-uri=http://localhost/nginx_status
    ports:
      - name: metrics
        containerPort: 9113
    livenessProbe:
      httpGet:
        path: /metrics
        port: 9113
      initialDelaySeconds: 5
      periodSeconds: 15
    readinessProbe:
      httpGet:
        path: /metrics
        port: 9113
      initialDelaySeconds: 3
      periodSeconds: 10
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65534
      capabilities:
        drop: [ALL]
