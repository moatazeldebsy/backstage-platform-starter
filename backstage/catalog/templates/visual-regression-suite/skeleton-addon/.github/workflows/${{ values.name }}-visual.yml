name: ${{ values.name }} Visual Regression Tests

on:
  push:
    branches: [main]
    paths:
      - 'test-suites/${{ values.name }}/**'
  pull_request:
    branches: [main]
    paths:
      - 'test-suites/${{ values.name }}/**'

env:
  BASE_URL: '${{ values.baseUrl }}'

jobs:
  visual:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-suites/${{ values.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Run visual regression tests
        run: npm test

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-${{ values.name }}
          path: test-suites/${{ values.name }}/test-results/
          retention-days: 7
