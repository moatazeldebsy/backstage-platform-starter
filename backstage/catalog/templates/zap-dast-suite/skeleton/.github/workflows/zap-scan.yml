name: OWASP ZAP Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'

env:
  TARGET_URL: '${{ values.targetUrl }}'
  OPENAPI_URL: '${{ values.openApiUrl }}'
  SCAN_TYPE: '${{ values.scanType }}'

jobs:
  zap-scan:
    name: ZAP Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        if: env.SCAN_TYPE == 'baseline'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: '${{ values.targetUrl }}'
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          artifact_name: zap-report

      - name: ZAP Full Scan
        if: env.SCAN_TYPE == 'full'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: '${{ values.targetUrl }}'
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          artifact_name: zap-report

      - name: ZAP API Scan
        if: env.SCAN_TYPE == 'api'
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: '${{ values.openApiUrl }}'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          artifact_name: zap-report
