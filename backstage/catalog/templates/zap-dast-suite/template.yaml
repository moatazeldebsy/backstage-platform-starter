apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: zap-dast-suite
  title: OWASP ZAP DAST Security Scan
  description: Scaffold an OWASP ZAP dynamic application security test suite with baseline and full-scan modes
  tags:
    - zap
    - dast
    - security
    - owasp
    - qa
    - local
    - aws
spec:
  owner: qa-team
  type: test-suite

  parameters:
    - title: Suite Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Suite Name
          type: string
          description: Unique name for this test suite (lowercase, hyphens only)
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        targetService:
          title: Target Service
          type: string
          description: The service this test suite targets
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Component
                spec.type: service
              - kind: Component
                spec.type: website
        deploymentMode:
          title: Deployment Mode
          type: string
          enum: [new-repository, add-to-existing]
          enumNames:
            - 'Create a new repository'
            - 'Add tests to an existing service repo (opens PR)'
          default: new-repository
      dependencies:
        deploymentMode:
          oneOf:
            - properties:
                deploymentMode:
                  enum: [new-repository]
                repoUrl:
                  title: GitHub Repository
                  type: string
                  ui:field: RepoUrlPicker
                  ui:help: 'Repository name must not already exist on GitHub.'
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - repoUrl
            - properties:
                deploymentMode:
                  enum: [add-to-existing]
                targetRepoUrl:
                  title: Target Service Repository
                  type: string
                  description: 'Pick the existing GitHub repo to open the PR against (must match the selected target service)'
                  ui:field: RepoUrlPicker
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - targetRepoUrl

    - title: Scan Configuration
      properties:
        targetUrl:
          title: Target URL
          type: string
          description: 'Service URL to scan (e.g. http://localhost:8080 for Kind, or https://<alb-dns>.amazonaws.com for AWS)'
          default: ''
        scanType:
          title: Default Scan Type
          type: string
          description: ZAP scan mode to run in CI
          default: baseline
          enum:
            - baseline
            - full
            - api
          enumNames:
            - 'Baseline (fast, passive rules only)'
            - 'Full (active attack simulation)'
            - 'API (OpenAPI/Swagger spec scan)'
        openApiUrl:
          title: OpenAPI Spec URL
          type: string
          description: 'OpenAPI spec URL (required for api scan type; e.g. http://localhost:8080/openapi.json or https://<alb-dns>.amazonaws.com/openapi.json)'
          default: ''
        failOnRiskLevel:
          title: Fail on Risk Level
          type: string
          description: Minimum alert risk level that causes CI to fail
          default: High
          enum:
            - Informational
            - Low
            - Medium
            - High

  steps:
    - id: fetch-template-new-repo
      name: Fetch Template (New Repo)
      action: fetch:template
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          targetUrl: ${{ parameters.targetUrl }}
          scanType: ${{ parameters.scanType }}
          openApiUrl: ${{ parameters.openApiUrl }}
          failOnRiskLevel: ${{ parameters.failOnRiskLevel }}
          githubOrg: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: fetch-template-addon
      name: Fetch Template (Add to Existing)
      action: fetch:template
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        url: ./skeleton-addon
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          targetUrl: ${{ parameters.targetUrl }}
          scanType: ${{ parameters.scanType }}
          openApiUrl: ${{ parameters.openApiUrl }}
          failOnRiskLevel: ${{ parameters.failOnRiskLevel }}
          githubOrg: ${{ (parameters.targetRepoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.targetRepoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        gitCommitMessage: "chore: initial scaffold via IDP"
        topics:
          - owasp-zap
          - dast
          - security

    - id: publish-pr
      name: Open Pull Request on Service Repo
      action: publish:github:pull-request
      continueOnError: true
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        repoUrl: ${{ parameters.targetRepoUrl }}
        title: 'test: add ${{ parameters.name }} OWASP ZAP DAST security scan'
        branchName: feat/add-${{ parameters.name }}-zap-suite
        description: |
          ## Add ${{ parameters.name }} OWASP ZAP DAST Security Scan

          Adds a owasp zap dast security scan targeting `${{ parameters.targetService }}`.

          **What's included:**
          - Test files under `test-suites/${{ parameters.name }}/`
          - GitHub Actions CI workflow at `.github/workflows/${{ parameters.name }}-zap.yml`
          - Backstage catalog entry at `test-suites/${{ parameters.name }}/catalog-info.yaml`

          After merging, register the catalog entry via **Backstage → Catalog → Register existing component**.

          > Scaffolded via the IDP QA Platform
        sourcePath: .

    - id: register
      name: Register in Catalog
      action: catalog:register
      continueOnError: true
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
