apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ${{ values.ownerService }}-db-credentials
  namespace: services
  labels:
    app.kubernetes.io/name: ${{ values.ownerService }}
    app.kubernetes.io/managed-by: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ${{ values.ownerService }}-db-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/${{ values.dbName }}"
        DB_HOST: "{{ .host }}"
        DB_PORT: "{{ .port }}"
        DB_NAME: "${{ values.dbName }}"
        DB_USER: "{{ .username }}"
  data:
    - secretKey: username
      remoteRef:
        key: idp-mvp/${{ values.ownerService }}/db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: idp-mvp/${{ values.ownerService }}/db-credentials
        property: password
    - secretKey: host
      remoteRef:
        key: idp-mvp/${{ values.ownerService }}/db-credentials
        property: host
    - secretKey: port
      remoteRef:
        key: idp-mvp/${{ values.ownerService }}/db-credentials
        property: port
