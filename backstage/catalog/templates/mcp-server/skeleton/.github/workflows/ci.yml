name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ '${{ github.repository }}' }}

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test

  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: tag
        run: |
          TAG="${GITHUB_SHA::8}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ '${{ env.REGISTRY }}' }}
          username: ${{ '${{ github.actor }}' }}
          password: ${{ '${{ secrets.GITHUB_TOKEN }}' }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ '${{ env.REGISTRY }}' }}/${{ '${{ env.IMAGE_NAME }}' }}:${{ '${{ steps.tag.outputs.tag }}' }}
            ${{ '${{ env.REGISTRY }}' }}/${{ '${{ env.IMAGE_NAME }}' }}:latest

  update-mcpserver:
    name: Update MCPServer image tag
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Update image tag in MCPServer manifest
        env:
          TAG: ${{ '${{ needs.docker.outputs.tag }}' }}
        run: sed -i "s|:latest|:${TAG}|g" kubernetes/mcpserver.yaml
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update MCPServer image tag"
          file_pattern: kubernetes/mcpserver.yaml
