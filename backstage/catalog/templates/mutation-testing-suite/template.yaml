apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mutation-testing-suite
  title: Mutation Testing Suite (Stryker)
  description: Scaffold a Stryker mutation testing configuration to measure test suite quality beyond code coverage
  tags:
    - stryker
    - mutation-testing
    - testing
    - qa
    - local
    - aws
spec:
  owner: qa-team
  type: test-suite

  parameters:
    - title: Suite Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Suite Name
          type: string
          description: Unique name for this test suite (lowercase, hyphens only)
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        targetService:
          title: Target Service
          type: string
          description: The service this test suite targets
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              - kind: Component
                spec.type: service
              - kind: Component
                spec.type: website
        deploymentMode:
          title: Deployment Mode
          type: string
          enum: [new-repository, add-to-existing]
          enumNames:
            - 'Create a new repository'
            - 'Add tests to an existing service repo (opens PR)'
          default: new-repository
      dependencies:
        deploymentMode:
          oneOf:
            - properties:
                deploymentMode:
                  enum: [new-repository]
                repoUrl:
                  title: GitHub Repository
                  type: string
                  ui:field: RepoUrlPicker
                  ui:help: 'Repository name must not already exist on GitHub.'
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - repoUrl
            - properties:
                deploymentMode:
                  enum: [add-to-existing]
                targetRepoUrl:
                  title: Target Service Repository
                  type: string
                  description: 'Pick the existing GitHub repo to open the PR against (must match the selected target service)'
                  ui:field: RepoUrlPicker
                  ui:options:
                    allowedHosts:
                      - github.com
                    allowedOwners:
                      - moatazeldebsy
              required:
                - targetRepoUrl

    - title: Configuration
      properties:
        mutationScore:
          title: Minimum Mutation Score (%)
          type: integer
          description: CI fails if mutation score drops below this threshold
          default: 70
        testRunner:
          title: Test Runner
          type: string
          default: jest
          enum:
            - jest
            - mocha
            - jasmine
          enumNames:
            - 'Jest'
            - 'Mocha'
            - 'Jasmine'
        reporters:
          title: Reporters
          type: array
          items:
            type: string
            enum:
              - progress
              - html
              - json
              - clear-text
          default:
            - progress
            - html
          ui:widget: checkboxes

  steps:
    - id: fetch-template-new-repo
      name: Fetch Template (New Repo)
      action: fetch:template
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          mutationScore: ${{ parameters.mutationScore }}
          testRunner: ${{ parameters.testRunner }}
          reporters: ${{ parameters.reporters }}
          githubOrg: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: fetch-template-addon
      name: Fetch Template (Add to Existing)
      action: fetch:template
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        url: ./skeleton-addon
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          targetService: ${{ parameters.targetService }}
          mutationScore: ${{ parameters.mutationScore }}
          testRunner: ${{ parameters.testRunner }}
          reporters: ${{ parameters.reporters }}
          githubOrg: ${{ (parameters.targetRepoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.targetRepoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        gitCommitMessage: "chore: initial scaffold via IDP"
        topics:
          - stryker
          - mutation-testing
          - qa

    - id: publish-pr
      name: Open Pull Request on Service Repo
      action: publish:github:pull-request
      continueOnError: true
      if: ${{ parameters.deploymentMode === 'add-to-existing' }}
      input:
        repoUrl: ${{ parameters.targetRepoUrl }}
        title: 'test: add ${{ parameters.name }} Stryker mutation testing suite'
        branchName: feat/add-${{ parameters.name }}-mutation-suite
        description: |
          ## Add ${{ parameters.name }} Mutation Testing Suite (Stryker)

          Adds a mutation testing suite (stryker) targeting `${{ parameters.targetService }}`.

          **What's included:**
          - Test files under `test-suites/${{ parameters.name }}/`
          - GitHub Actions CI workflow at `.github/workflows/${{ parameters.name }}-mutation.yml`
          - Backstage catalog entry at `test-suites/${{ parameters.name }}/catalog-info.yaml`

          After merging, register the catalog entry via **Backstage → Catalog → Register existing component**.

          > Scaffolded via the IDP QA Platform
        sourcePath: .

    - id: register
      name: Register in Catalog
      action: catalog:register
      continueOnError: true
      if: ${{ parameters.deploymentMode !== 'add-to-existing' }}
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
