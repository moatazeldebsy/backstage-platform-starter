apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-service
  title: Node.js Service
  description: Scaffold a Node.js/Express service with CI/CD and Helm deployment
  tags:
    - nodejs
    - express
    - golden-path
    - local
    - aws
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Service Name
          type: string
          description: Unique service name (lowercase, hyphens only)
          pattern: '^[a-z][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          description: Team or user owning this service
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

    - title: Infrastructure
      properties:
        environment:
          title: Initial Environment
          type: string
          default: dev
          enum:
            - dev
        port:
          title: Container Port
          type: integer
          default: 3000
        costCenter:
          title: Cost Center
          type: string
          description: "Team cost center code for OpenCost attribution (e.g. eng-platform, eng-product)"
          default: eng-platform

    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub Repository
          type: string
          ui:field: RepoUrlPicker
          ui:help: "Repository name must not already exist on GitHub. If you get a 'name already exists' error, choose a different name."
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - moatazeldebsy

  steps:
    - id: fetch-template
      name: Fetch Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}
          costCenter: ${{ parameters.costCenter }}
          githubOrg: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        gitCommitMessage: "chore: initial scaffold via IDP"
        topics:
          - nodejs
          - idp-service

    - id: set-repo-secrets
      name: Configure CI/CD Secrets
      action: idp:repo:set-secrets
      continueOnError: true
      input:
        repoUrl: ${{ steps.publish.output.remoteUrl }}
        secrets:
          AWS_ROLE_ARN: "arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/idp-mvp-github-actions"

    - id: register
      name: Register in Catalog
      action: catalog:register
      continueOnError: true
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    - id: register-api
      name: Register API in Catalog
      action: catalog:register
      continueOnError: true
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/api-info.yaml'

    - id: fetch-platform-values
      name: Prepare Platform GitOps Values
      action: fetch:template
      input:
        url: ./platform-values
        targetPath: ./platform-values
        values:
          name: ${{ parameters.name }}
          githubOrg: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          port: ${{ parameters.port }}
          owner: ${{ parameters.owner }}
          costCenter: ${{ parameters.costCenter }}

    - id: platform-pr
      name: Open Platform GitOps PR
      action: publish:github:pull-request
      continueOnError: true
      input:
        repoUrl: github.com?repo=backstage-idp-starter&owner=moatazeldebsy
        title: "feat: onboard ${{ parameters.name }} to GitOps"
        branchName: feat/onboard-${{ parameters.name }}
        description: |
          Adds `services/${{ parameters.name }}/` to the platform repo.

          ArgoCD ApplicationSet will auto-discover and deploy this service
          to `services-dev` namespace once merged.
        sourcePath: ./platform-values
        targetPath: services/${{ parameters.name }}

    - id: seed-image
      name: Seed placeholder image in local registry
      action: idp:seed-image
      continueOnError: true
      input:
        serviceName: ${{ parameters.name }}

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Open API
        icon: code
        entityRef: ${{ steps.register-api.output.entityRef }}
      - title: Open Platform GitOps PR
        url: ${{ steps['platform-pr'].output.remoteUrl }}
