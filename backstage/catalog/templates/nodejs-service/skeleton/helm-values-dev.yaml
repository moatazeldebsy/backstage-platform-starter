replicaCount: 1

image:
  repository: ghcr.io/${{ values.githubOrg }}/${{ values.name }}
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: ${{ values.port }}

ingress:
  enabled: true
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

podLabels:
  team: ${{ values.owner }}
  cost-center: ${{ values.costCenter }}
  environment: dev

metrics:
  enabled: true

env:
  - name: LOG_LEVEL
    value: debug
  - name: ENVIRONMENT
    value: dev
