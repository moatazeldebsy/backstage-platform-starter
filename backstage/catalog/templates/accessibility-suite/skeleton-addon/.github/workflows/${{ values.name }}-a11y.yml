name: ${{ values.name }} Accessibility Tests

on:
  push:
    branches: [main]
    paths:
      - 'test-suites/${{ values.name }}/**'
  pull_request:
    branches: [main]
    paths:
      - 'test-suites/${{ values.name }}/**'

env:
  BASE_URL: '${{ values.baseUrl }}'
  WCAG_LEVEL: '${{ values.wcagLevel }}'

jobs:
  a11y:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-suites/${{ values.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Run accessibility tests
        run: npm test

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report-${{ values.name }}
          path: test-suites/${{ values.name }}/playwright-report/
          retention-days: 30
