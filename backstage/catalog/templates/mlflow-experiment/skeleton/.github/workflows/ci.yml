name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ values.pythonVersion }}"
      - run: pip install -r requirements.txt ruff pytest
      - run: ruff check . || true
      - run: python -m pytest --tb=short || true

  train:
    name: Training smoke test
    runs-on: ubuntu-latest
    needs: test
    env:
      N_ESTIMATORS: "10"
      MLFLOW_TRACKING_URI: http://localhost:5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ values.pythonVersion }}"
      - run: pip install -r requirements.txt mlflow
      - name: Start local MLflow
        run: |
          mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --host 127.0.0.1 \
            --port 5000 &
          sleep 3
      - name: Run training
        run: python train.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_NAME: ${{ values.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: tag
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: echo "tag=${COMMIT_SHA::8}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ values.name }}:${{ steps.tag.outputs.tag }}
