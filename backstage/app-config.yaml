app:
  title: IDP Developer Portal
  baseUrl: http://localhost:3000

  # Auto-discover all frontend plugins listed in packages/app/package.json
  packages: all

  extensions:
    # Catalog is the home page
    - page:catalog:
        config:
          path: /

organization:
  name: My Organization

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    upgrade-insecure-requests: false
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # Required for Backstage v1.29+ token-based auth system.
  # Without this key, the guest auth backend cannot sign session cookies and
  # the UI shows "Failed to sign in as a guest using the auth backend" on load.
  auth:
    keys:
      - secret: ${BACKSTAGE_AUTH_SECRET:-dev-secret-change-in-production}
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      ssl:
        rejectUnauthorized: false
    knexConfig:
      pool:
        min: 3
        max: 20
        acquireTimeoutMillis: 60000
        idleTimeoutMillis: 30000

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'awsS3'
    awsS3:
      bucketName: ${TECHDOCS_S3_BUCKET_NAME}
      region: ${AWS_REGION}

auth:
  environment: development
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true
    github:
      development:
        # Use a non-empty placeholder so the backend starts even without real OAuth creds.
        # GitHub login will fail at the OAuth handshake (not at startup) when these are unset.
        # Set AUTH_GITHUB_CLIENT_ID and AUTH_GITHUB_CLIENT_SECRET in local/backstage/.env
        # to enable real GitHub sign-in.
        clientId: ${AUTH_GITHUB_CLIENT_ID:-not-configured}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET:-not-configured}
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName
              dangerouslyAllowSignInWithoutUserInCatalog: true
            - resolver: emailMatchingUserEntityProfileEmail
              dangerouslyAllowSignInWithoutUserInCatalog: true

scaffolder:
  defaultAuthor:
    name: IDP Bot
    email: idp-bot@example.com
  defaultCommitMessage: "chore: scaffold service via IDP"

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Template, User, Group]
  locations:
    # Platform-owned templates (paths are absolute inside the container)
    - type: file
      target: /catalog/templates/nodejs-service/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/python-service/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/deploy-to-kind/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/react-frontend/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/go-service/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/terraform-module/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/team-namespace/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/add-secret/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/rds-database/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/kafka-topic/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/s3-bucket/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/eks-cluster/template.yaml
      rules:
        - allow: [Template]
    # QA golden-path testing scaffolds
    - type: file
      target: /catalog/templates/playwright-e2e-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/k6-performance-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/pact-contract-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/newman-api-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/zap-dast-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/datadog-synthetic-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/visual-regression-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/accessibility-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/bdd-cucumber-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/appium-mobile-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/chaos-mesh-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/mutation-testing-suite/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/testcontainers-suite/template.yaml
      rules:
        - allow: [Template]
    # Platform entities: users, groups (system moved to root catalog-info.yaml)
    - type: file
      target: /catalog/catalog-info.yaml
      rules:
        - allow: [User, Group]
    # Auto-discover team Group entities created by the team-namespace template
    - type: file
      target: /catalog/groups/*.yaml
      rules:
        - allow: [Group]
    # QA team, qa-engineer user, and QA platform component
    - type: file
      target: /catalog/qa-catalog.yaml
      rules:
        - allow: [User, Group, Component]
    # System entity at repo root (uses dir:. for techdocs → mkdocs.yml + docs/ at /)
    - type: file
      target: /catalog-info.yaml
      rules:
        - allow: [System]
    # API definitions
    - type: file
      target: /catalog/apis/hello-service-api.yaml
      rules:
        - allow: [API]
    # Registered services (co-located catalog-info uses dir:. for techdocs)
    - type: file
      target: /services/hello-service/catalog-info.yaml
      rules:
        - allow: [Component]
    # ── AI / ML / MCP Platform ───────────────────────────────────────────────
    - type: file
      target: /catalog/templates/ai-agent-kagent/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/mlflow-experiment/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/templates/mcp-server/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: /catalog/resources/ai-platform.yaml
      rules:
        - allow: [Resource, Component]
    - type: file
      target: /services/idp-mcp-server/catalog-info.yaml
      rules:
        - allow: [Component]
    - type: file
      target: /services/idp-mcp-server/api.yaml
      rules:
        - allow: [API]
    # ── QA MCP Server ────────────────────────────────────────────────────────
    - type: file
      target: /services/qa-mcp-server/catalog-info.yaml
      rules:
        - allow: [Component]
    # ── Scaffolded ML experiments (written at scaffold-time by idp:run-training-job) ──
    - type: file
      target: /catalog/ml-experiments/*/catalog-info.yaml
      rules:
        - allow: [Component]

  # GitHub org auto-discovery — finds all repos with a catalog-info.yaml in
  # YOUR_GITHUB_ORG automatically. New scaffolded services appear within 15 min.
  # Requires GITHUB_TOKEN with read:org + repo scopes in local/.env.
  providers:
    github:
      idpOrg:
        organization: YOUR_GITHUB_ORG
        catalogPath: /catalog-info.yaml
        filters:
          branch: main
          repository: '.*'
        schedule:
          frequency: { minutes: 15 }
          timeout: { minutes: 3 }

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - url: ${K8S_CLUSTER_URL}
          name: idp-mvp
          authProvider: 'serviceAccount'
          skipTLSVerify: true
          skipMetricsLookup: false
          serviceAccountToken: ${K8S_SERVICE_ACCOUNT_TOKEN}

techRadar:
  url: https://raw.githubusercontent.com/YOUR_GITHUB_ORG/backstage-idp-starter/main/backstage/catalog/tech-radar.json

# Tech Insights — developer scorecard fact collection
techInsights:
  factRetrievers:
    entityMetadataFactRetriever:
      cadence: '*/30 * * * *'
    entityOwnershipFactRetriever:
      cadence: '*/30 * * * *'
  scorecards:
    - id: golden-path-scorecard
      name: Golden Path Scorecard
      description: Checks that a service follows the IDP golden path
      checks:
        - id: has-owner
          name: Has Owner
          description: Component must have an owner group defined
          factRef: entityMetadataFactRetriever:default/hasOwner
          successCriteria:
            - factOperator: IS_GREATER_THAN
              value: 0
        - id: has-lifecycle
          name: Has Lifecycle
          description: Component must have a lifecycle (development, production, deprecated)
          factRef: entityMetadataFactRetriever:default/hasLifecycle
          successCriteria:
            - factOperator: IS_GREATER_THAN
              value: 0
        - id: has-techdocs
          name: Has TechDocs
          description: Component must have a backstage.io/techdocs-ref annotation
          factRef: entityMetadataFactRetriever:default/hasTechDocs
          successCriteria:
            - factOperator: IS_GREATER_THAN
              value: 0
        - id: has-kubernetes-id
          name: Has Kubernetes ID
          description: Component must have backstage.io/kubernetes-id annotation for K8s plugin
          factRef: entityMetadataFactRetriever:default/hasAnnotation/backstage.io/kubernetes-id
          successCriteria:
            - factOperator: IS_GREATER_THAN
              value: 0
        - id: has-grafana-link
          name: Has Grafana Link
          description: Component should have a Grafana dashboard link in metadata.links
          factRef: entityMetadataFactRetriever:default/hasLinks
          successCriteria:
            - factOperator: IS_GREATER_THAN
              value: 0

# KAgent AI assistant proxy — target is the in-cluster kagent-ui service.
# The local override in app-config.local.yaml points this at the ingress hostname.
proxy:
  endpoints:
    /kagent:
      target: http://kagent-ui.kagent.svc.cluster.local:8080
      allowedMethods: ['GET', 'POST']
      changeOrigin: true


