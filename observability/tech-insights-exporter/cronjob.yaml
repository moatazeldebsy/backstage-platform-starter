apiVersion: batch/v1
kind: CronJob
metadata:
  name: tech-insights-exporter
  namespace: monitoring
  labels:
    app: tech-insights-exporter
    team: platform-team
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: tech-insights-exporter
        spec:
          restartPolicy: OnFailure
          containers:
            - name: exporter
              image: python:3.12-slim
              command:
                - /bin/sh
                - -c
                - |
                  pip install requests --quiet && python /app/exporter.py
              env:
                - name: BACKSTAGE_URL
                  value: "http://backstage.backstage.svc.cluster.local:7007"
                - name: BACKSTAGE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: backstage-catalog-exporter-token
                      key: token
                      optional: true
                - name: PUSHGATEWAY_URL
                  value: "http://prometheus-pushgateway.monitoring.svc.cluster.local:9091"
                - name: MODE
                  value: "pushgateway"
              volumeMounts:
                - name: exporter-script
                  mountPath: /app
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: exporter-script
              configMap:
                name: tech-insights-exporter-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tech-insights-exporter-script
  namespace: monitoring
data:
  exporter.py: |
    # Mounted from observability/tech-insights-exporter/exporter.py
    # Re-build this ConfigMap after editing the exporter:
    #   kubectl create configmap tech-insights-exporter-script \
    #     --from-file=exporter.py=observability/tech-insights-exporter/exporter.py \
    #     -n monitoring --dry-run=client -o yaml | kubectl apply -f -
