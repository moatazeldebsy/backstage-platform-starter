# Default values for service-template.
# Override in your service's values.yaml.

replicaCount: 2

# Pods must be Running AND passing readiness for this many seconds before they
# receive traffic. Prevents nginx from hitting a pod that just passed its first
# readiness check but isn't fully warm yet.
minReadySeconds: 10

image:
  repository: ""   # Set to your ECR repository URL
  tag: "local"     # Never use "latest" — blocked by deny-latest-tag policy in services-prod
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"   # "alb" for AWS, "nginx" for local — override in service's helm-values.yaml
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Retry on upstream errors/timeouts so a single slow pod doesn't 503 the user
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "3"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Health check endpoints (convention)
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1

# Grace period given to a terminating pod before SIGTERM. nginx takes ~2 s to
# remove a pod from its upstream list; this sleep ensures no in-flight requests
# are dropped during a rolling update or pod eviction.
lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC: create a ClusterRole + ClusterRoleBinding for the service account.
# Useful for services that need to query the Kubernetes API (e.g. list deployments).
rbac:
  create: false
  # rules follow the standard ClusterRole rules format.
  rules: []
  # Example for an MCP server that needs to list deployments:
  # rules:
  #   - apiGroups: ["apps"]
  #     resources: ["deployments"]
  #     verbs: ["get", "list", "watch"]

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

# Additional labels applied to every pod — use for cost attribution and team ownership.
# Example:
#   team: platform-team
#   cost-center: eng-platform
#   environment: dev
podLabels: {}

backstage:
  # Override the backstage.io/kubernetes-id pod label.
  # Defaults to .Release.Name if empty. Set to the service name (without env suffix)
  # so Backstage K8s plugin can match pods to the component by name.
  kubernetesId: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

env: []
  # - name: LOG_LEVEL
  #   value: info

envFrom: []
  # - secretRef:
  #     name: my-service-secrets

nodeSelector: {}
tolerations: []
# affinity is built by the chart template using selectorLabels — override here if needed
affinity: {}

# Prometheus ServiceMonitor — enable to have prometheus-operator scrape this service
metrics:
  enabled: true
  path: /metrics
  # Named port the ServiceMonitor scrapes. Use "http" for services that expose
  # /metrics on their main port. Set to "metrics" for sidecar exporters (e.g.
  # nginx-prometheus-exporter on :9113) that add an extraPort named "metrics".
  port: http
  interval: 30s
  scrapeTimeout: 10s

# Additional sidecar containers injected into the Pod alongside the main container.
# Useful for metrics exporters, log shippers, etc.
# Each entry is a full Kubernetes container spec.
extraContainers: []

# Additional ports added to the Service (and the corresponding container ports
# should be declared inside extraContainers). Used when a sidecar exposes a
# metrics port that needs to be reachable by the ServiceMonitor.
extraPorts: []
