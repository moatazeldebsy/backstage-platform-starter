replicaCount: 1

image:
  repository: ghcr.io/YOUR_GITHUB_ORG/demo-svc
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: demo-svc-dev.idp.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

env:
  - name: ENVIRONMENT
    value: dev
