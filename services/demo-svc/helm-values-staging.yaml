replicaCount: 2

image:
  repository: ghcr.io/YOUR_GITHUB_ORG/demo-svc
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: demo-svc-staging.idp.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  - name: ENVIRONMENT
    value: staging
