# Helm overrides for hello-service — dev environment
# image.tag is updated automatically by CI when pushed to main
image:
  repository: ghcr.io/moatazeldebsy/hello-service
  tag: "latest"

replicaCount: 1

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: hello-service-dev.idp.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

env:
  - name: LOG_LEVEL
    value: debug
  - name: ENVIRONMENT
    value: dev
