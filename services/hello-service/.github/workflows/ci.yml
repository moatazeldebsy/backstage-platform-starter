name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

env:
  SERVICE_NAME: hello-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: |
          go mod download
          go mod verify

      - name: Run tests with coverage
        run: go test ./src/... -coverprofile=coverage.out -covermode=atomic

      - name: Build Docker image (smoke check)
        run: docker build -t hello-service:ci .

      - name: Smoke-test container
        run: |
          docker run -d --name svc -p 8080:8080 -e PORT=8080 hello-service:ci
          sleep 3
          curl -sf --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8080/healthz
          curl -sf --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8080/ready
          docker stop svc && docker rm svc

  publish:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE=ghcr.io/${{ github.repository_owner }}/hello-service
          docker build -t ${IMAGE}:${SHORT_SHA} -t ${IMAGE}:latest .
          docker push ${IMAGE}:${SHORT_SHA}
          docker push ${IMAGE}:latest
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Update image tag in platform repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not set — platform repo image tag update skipped"
            exit 0
          fi
          git config --global user.email "ci@idp.platform"
          git config --global user.name "IDP CI Bot"
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/backstage-idp-starter.git /tmp/platform
          cd /tmp/platform
          VALUES_FILE="services/hello-service/helm-values-dev.yaml"
          if [ -f "${VALUES_FILE}" ]; then
            sed -i "s|^  tag: .*|  tag: \"${SHORT_SHA}\"|" "${VALUES_FILE}"
            git add "${VALUES_FILE}"
            git diff --cached --quiet || git commit -m "chore: bump hello-service image to ${SHORT_SHA} [skip ci]"
            git push
          else
            echo "Values file not found at ${VALUES_FILE} — merge the Platform GitOps PR first"
          fi
