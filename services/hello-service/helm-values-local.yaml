# Helm overrides for hello-service — local Kind cluster
replicaCount: 1

image:
  repository: localhost:5003/hello-service
  tag: local

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: hello-service.idp.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  - name: LOG_LEVEL
    value: debug
  - name: ENVIRONMENT
    value: local
